<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Выбор фото для главной</title>
<style>
body{background:#0e0f12;color:#eef0f3;font-family:Inter,Arial,sans-serif;margin:0;padding:30px}
h1{font-family:Georgia,serif;font-weight:500}
p{color:#adb2bb}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;margin-top:24px}
.card{background:#15171b;border:1px solid rgba(255,255,255,.1);border-radius:8px;overflow:hidden}
.card img{width:100%;height:230px;object-fit:cover;display:block;background:#222}
.id{padding:12px 14px;font-size:15px}
.id b{color:#e9ecf1;font-size:18px}
.id span{color:#787d86}
</style></head>
<body>
<h1>Кандидаты для фото на главной</h1>
<p>Выбери понравившееся и скажи мне число под ним (id). Я поставлю его в герой главной страницы.</p>
<div class="grid" id="g"></div>
<script>
var ids = [20348123,8146212,8142459,8142046,6538943,6538936,7535035,7031879,6920612,35021550,36740615,18285887,3990599,6315804,1103560,12700512];
var g = document.getElementById('g');
ids.forEach(function(id){
  var url = 'https://images.pexels.com/photos/'+id+'/pexels-photo-'+id+'.jpeg?auto=compress&cs=tinysrgb&fit=crop&w=600&h=400';
  g.innerHTML += '<div class="card"><img src="'+url+'" loading="lazy" alt=""><div class="id"><b>'+id+'</b> <span>&larr; назови это число</span></div></div>';
});
</script>
</body></html>
